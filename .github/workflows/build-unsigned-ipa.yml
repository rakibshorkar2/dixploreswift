name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_PATH: DirXplore/DirXplore.xcodeproj
  SCHEME: DirXplore
  CONFIGURATION: Release
  SDK: iphoneos
  DERIVED_DATA: DerivedData
  DESTINATION: generic/platform=iOS

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode with iOS 18 SDK
        run: |
          ls /Applications | grep -i xcode
          for xc in /Applications/Xcode_*.app /Applications/Xcode.app; do
            if [ -d "$xc" ]; then
              sudo xcode-select -s "$xc/Contents/Developer"
              if xcodebuild -version -sdk 2>/dev/null | grep -q "iphoneos18"; then
                echo "Using: $xc"
                xcodebuild -version
                break
              fi
            fi
          done
          xcodebuild -version -sdk 2>/dev/null | head -5
          if ! xcodebuild -version -sdk 2>/dev/null | grep -q "iphoneos18"; then
            echo "iOS 18 SDK not found, downloading..."
            sudo xcodebuild -license accept 2>/dev/null || true
            xcodebuild -downloadPlatform iOS -allowProvisioningUpdates 2>&1 | tail -5
          fi

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration "${{ env.CONFIGURATION }}" \
            -sdk "${{ env.SDK }}" \
            -destination "${{ env.DESTINATION }}" \
            -derivedDataPath "${{ env.DERIVED_DATA }}" \
            -resolvePackageDependencies \
            CODE_SIGNING_ALLOWED=NO

      - name: Build the .app bundle
        run: |
          set -eo pipefail
          xcodebuild -project "${{ env.PROJECT_PATH }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination "${{ env.DESTINATION }}" \
            -configuration "${{ env.CONFIGURATION }}" \
            -sdk "${{ env.SDK }}" \
            -derivedDataPath "${{ env.DERIVED_DATA }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            OTHER_CODE_SIGN_FLAGS="--no-strict" \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            2>&1 | tee xcodebuild.log

      - name: Verify .app bundle
        run: |
          APP_DIR="${{ env.DERIVED_DATA }}/Build/Products/${{ env.CONFIGURATION }}-${{ env.SDK }}"
          APP_PATH="$APP_DIR/${{ env.SCHEME }}.app"
          echo "Checking: $APP_PATH"
          ls -la "$APP_PATH" || { echo "ERROR: .app not found at $APP_PATH"; ls -la "$APP_DIR/" 2>/dev/null || true; exit 1; }
          ls -la "$APP_PATH/Info.plist" 2>/dev/null && echo "Info.plist found" || { echo "ERROR: Info.plist missing in bundle"; ls -la "$APP_PATH/" 2>/dev/null; exit 1; }
          echo "Bundle verified successfully"

      - name: Package unsigned .app into .ipa
        run: |
          APP_DIR="${{ env.DERIVED_DATA }}/Build/Products/${{ env.CONFIGURATION }}-${{ env.SDK }}"
          APP_PATH="$APP_DIR/${{ env.SCHEME }}.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r DirXplore.unsigned.ipa Payload/
          rm -rf Payload
          echo "IPA_SIZE=$(stat -f%z DirXplore.unsigned.ipa)" >> $GITHUB_ENV

      - name: Upload unsigned IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirXplore-unsigned-ipa
          path: DirXplore.unsigned.ipa
          if-no-files-found: error

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore
